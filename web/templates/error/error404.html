<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 — Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-white px-4">
    <div class="text-center max-w-md">
        <p class="text-8xl font-medium tracking-tighter text-gray-900 leading-none mb-2">404</p>
        <div class="w-12 h-0.5 bg-gray-200 mx-auto mb-6"></div>
        <h1 class="text-xl font-medium text-gray-900 mb-3">Page not found</h1>
        <p class="text-sm text-gray-500 leading-relaxed mb-8">
            The page you're looking for doesn't exist or has been moved.
            Double-check the URL or head back home.
        </p>
        <div class="flex gap-3 justify-center flex-wrap">
            <a href="javascript:history.back()" class="px-5 py-2.5 text-sm border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">Go back</a>
            <a href="{{ url_for('web_routes.index') }}" class="px-5 py-2.5 text-sm border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">Go home</a>
        </div>
        <p class="text-xs text-gray-400 mt-8">Error code: 404 &middot; If you think this is a mistake, contact support</p>
    </div>
</body>
</html>
