<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>500 — Internal Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-white px-4">
    <div class="text-center max-w-md">
        <p class="text-8xl font-medium tracking-tighter text-gray-900 leading-none mb-2">500</p>
        <div class="w-12 h-0.5 bg-gray-200 mx-auto mb-6"></div>
        <h1 class="text-xl font-medium text-gray-900 mb-3">Internal server error</h1>
        <p class="text-sm text-gray-500 leading-relaxed mb-8">
            Something went wrong on our end. We're working to fix it —
            please try again in a moment.
        </p>
        <div class="flex gap-3 justify-center flex-wrap">
            <a href="javascript:history.back()" class="px-5 py-2.5 text-sm border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">Go back</a>
            <a href="javascript:location.reload()" class="px-5 py-2.5 text-sm border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">Try again</a>
        </div>
        <p class="text-xs text-gray-400 mt-8">Error code: 500 &middot; If this keeps happening, contact support</p>
    </div>
</body>
</html>
